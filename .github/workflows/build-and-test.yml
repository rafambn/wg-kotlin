name: Build and Test

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-native-binaries:
    name: Build Native ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x64
            gradle-command: .\gradlew.bat :wg-kotlin-daemon-jvm:nativeCompile --no-daemon --no-configuration-cache
            artifact-name: vpn-daemon-windows-x64

          - os: macos-26
            name: macOS x64
            gradle-command: ./gradlew :wg-kotlin-daemon-jvm:nativeCompile --no-daemon
            artifact-name: vpn-daemon-macos-x64

          - os: macos-latest
            name: macOS ARM64
            gradle-command: ./gradlew :wg-kotlin-daemon-jvm:nativeCompile --no-daemon
            artifact-name: vpn-daemon-macos-arm64

          - os: ubuntu-latest
            name: Linux x64
            gradle-command: ./gradlew :wg-kotlin-daemon-jvm:nativeCompile --no-daemon
            artifact-name: vpn-daemon-linux-x64

          - os: ubuntu-24.04-arm
            name: Linux ARM64
            gradle-command: ./gradlew :wg-kotlin-daemon-jvm:nativeCompile --no-daemon
            artifact-name: vpn-daemon-linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Visual C++ Build Tools (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up GraalVM for JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "25"
          distribution: "graalvm-community"
          components: "native-image"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build native binary
        run: ${{ matrix.gradle-command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: wg-kotlin-daemon-jvm/build/native/nativeCompile/
          if-no-files-found: error
          retention-days: 7
